<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dots and Boxes - Sandbox Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dot {
            width: 12px;
            height: 12px;
            transform: translate(-6px, -6px);
        }
        /* Hitboxes invisibles pero amplias para tocar fácil en móviles */
        .edge-h { height: 16px; transform: translateY(-8px); }
        .edge-v { width: 16px; transform: translateX(-8px); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans select-none">

    <header class="text-center mb-6">
        <h1 class="text-4xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-violet-500 mb-2">
            Dots & Boxes
        </h1>
        <p class="text-xs text-slate-400 uppercase tracking-widest">Sandbox con Validación de Bordes</p>
        
        <div class="flex gap-6 justify-center mt-4 text-sm">
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]"></div>
                <span>Jugador 1</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded bg-violet-500 shadow-[0_0_10px_rgba(139,92,246,0.5)]"></div>
                <span>Jugador 2</span>
            </div>
        </div>
    </header>

    <main class="relative bg-slate-800/50 border border-slate-700/50 p-8 rounded-2xl shadow-2xl backdrop-blur-sm">
        
        <div class="relative w-[300px] h-[300px] sm:w-[400px] sm:h-[400px]">
            
            <div id="boxes-layer" class="grid grid-cols-5 grid-rows-5 gap-0 w-full h-full absolute inset-0 z-10">
                </div>

            <div id="edges-layer" class="absolute inset-0 pointer-events-none z-20">
                </div>

            <div id="dots-layer" class="absolute inset-0 pointer-events-none z-30">
                </div>

        </div>

    </main>

    <footer class="mt-6 flex flex-col items-center gap-2">
        <button id="reset-btn" class="px-5 py-2 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-300 hover:text-white font-medium text-sm rounded-lg border border-slate-700 transition-all duration-150 shadow-md">
            Reiniciar Tablero
        </button>
        <p class="text-xs text-slate-500 italic">Tip: Solo podés pintar una caja si completás primero sus 4 lados.</p>
    </footer>

    <script>
        const SIZE = 6; // Grilla de 6x6 puntos
        const BOX_SIZE = SIZE - 1; // 5x5 Cajas

        const boxesLayer = document.getElementById('boxes-layer');
        const edgesLayer = document.getElementById('edges-layer');
        const dotsLayer = document.getElementById('dots-layer');
        const resetBtn = document.getElementById('reset-btn');

        let hEdges = {};
        let vEdges = {};
        let allBoxes = [];

        function initGame() {
            boxesLayer.innerHTML = '';
            edgesLayer.innerHTML = '';
            dotsLayer.innerHTML = '';
            hEdges = {};
            vEdges = {};
            allBoxes = [];

            const pct = 100 / (SIZE - 1);

            // --- 1. GENERAR ARISTAS HORIZONTALES ---
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < BOX_SIZE; c++) {
                    const edge = document.createElement('div');
                    edge.className = 'absolute edge-h cursor-pointer pointer-events-auto transition-all duration-200';
                    edge.style.top = `${r * pct}%`;
                    edge.style.left = `${c * pct}%`;
                    edge.style.width = `${pct}%`;
                    
                    const line = document.createElement('div');
                    line.className = 'w-full h-[4px] bg-slate-700/50 rounded mt-[6px] transition-all duration-200';
                    edge.appendChild(line);

                    setupEdgeToggle(edge, line);
                    edgesLayer.appendChild(edge);
                    
                    hEdges[`${r},${c}`] = edge;
                }
            }

            // --- 2. GENERAR ARISTAS VERTICALES ---
            for (let r = 0; r < BOX_SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const edge = document.createElement('div');
                    edge.className = 'absolute edge-v cursor-pointer pointer-events-auto transition-all duration-200';
                    edge.style.top = `${r * pct}%`;
                    edge.style.left = `${c * pct}%`;
                    edge.style.height = `${pct}%`;

                    const line = document.createElement('div');
                    line.className = 'h-full w-[4px] bg-slate-700/50 rounded ml-[6px] transition-all duration-200';
                    edge.appendChild(line);

                    setupEdgeToggle(edge, line);
                    edgesLayer.appendChild(edge);
                    
                    vEdges[`${r},${c}`] = edge;
                }
            }

            // --- 3. GENERAR CAJAS ---
            for (let r = 0; r < BOX_SIZE; r++) {
                for (let c = 0; c < BOX_SIZE; c++) {
                    const box = document.createElement('div');
                    box.className = 'border border-transparent transition-all duration-300 rounded-sm m-[2px] bg-slate-800/10 cursor-not-allowed';
                    box.dataset.state = 'empty';

                    box.dataset.edges = JSON.stringify({
                        top: `h:${r},${c}`,
                        bottom: `h:${r+1},${c}`,
                        left: `v:${r},${c}`,
                        right: `v:${r},${c+1}`
                    });

                    box.addEventListener('click', () => {
                        if (!isBoxClosed(box)) return; 

                        if (box.dataset.state === 'empty') {
                            box.dataset.state = 'p1';
                            box.className = 'border border-transparent transition-all duration-300 cursor-pointer rounded-sm m-[2px] bg-amber-500/40 shadow-[inset_0_0_15px_rgba(245,158,11,0.3)] border-amber-500/30';
                        } else if (box.dataset.state === 'p1') {
                            box.dataset.state = 'p2';
                            box.className = 'border border-transparent transition-all duration-300 cursor-pointer rounded-sm m-[2px] bg-violet-500/40 shadow-[inset_0_0_15px_rgba(139,92,246,0.3)] border-violet-500/30';
                        } else {
                            box.dataset.state = 'empty';
                            box.className = 'border border-transparent transition-all duration-300 cursor-pointer rounded-sm m-[2px] bg-slate-800/30 hover:bg-slate-700/20';
                        }
                    });

                    boxesLayer.appendChild(box);
                    allBoxes.push(box);
                }
            }

            // --- 4. GENERAR PUNTOS ESTÁTICOS ---
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const dot = document.createElement('div');
                    dot.className = 'absolute dot bg-slate-400 rounded-full shadow-[0_0_4px_rgba(255,255,255,0.4)]';
                    dot.style.top = `${r * pct}%`;
                    dot.style.left = `${c * pct}%`;
                    dotsLayer.appendChild(dot);
                }
            }
        }

        function isBoxClosed(box) {
            const targets = JSON.parse(box.dataset.edges);
            
            const topActive = hEdges[targets.top.split(':')[1]].dataset.active === "true";
            const bottomActive = hEdges[targets.bottom.split(':')[1]].dataset.active === "true";
            const leftActive = vEdges[targets.left.split(':')[1]].dataset.active === "true";
            const rightActive = vEdges[targets.right.split(':')[1]].dataset.active === "true";

            return topActive && bottomActive && leftActive && rightActive;
        }

        function updateBoxesStyle() {
            allBoxes.forEach(box => {
                const closed = isBoxClosed(box);
                
                if (!closed) {
                    box.dataset.state = 'empty';
                    box.className = 'border border-transparent transition-all duration-300 rounded-sm m-[2px] bg-slate-800/10 cursor-not-allowed';
                } else if (box.dataset.state === 'empty') {
                    box.className = 'border border-transparent transition-all duration-300 cursor-pointer rounded-sm m-[2px] bg-slate-800/30 hover:bg-slate-700/20';
                }
            });
        }

        function setupEdgeToggle(edgeContainer, lineElement) {
            edgeContainer.dataset.active = "false";
            edgeContainer.addEventListener('click', () => {
                if (edgeContainer.dataset.active === "false") {
                    edgeContainer.dataset.active = "true";
                    lineElement.className = 'w-full h-full bg-slate-300 rounded shadow-[0_0_8px_rgba(255,255,255,0.6)]';
                } else {
                    edgeContainer.dataset.active = "false";
                    if (edgeContainer.classList.contains('edge-h')) {
                        lineElement.className = 'w-full h-[4px] bg-slate-700/50 rounded mt-[6px] transition-all duration-200';
                    } else {
                        lineElement.className = 'h-full w-[4px] bg-slate-700/50 rounded ml-[6px] transition-all duration-200';
                    }
                }
                updateBoxesStyle();
            });
        }

        resetBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
